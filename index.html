<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S³ — Building Opportunities</title>
  <meta name="description"
    content="S³ (SCube) is a student-led platform connecting talented students with startups and opportunities. Networking, skill building, and real-world growth in Hyderabad and beyond.">
  <meta name="keywords" content="S3, SCube, student startup, internship, skill building, Hyderabad, student ecosystem">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: #1a1f3a
    }

    :root {
      --cinema-pad-x: 7.5dvh;
      --bg: #1a1f3a;
      --ink: #f1e7d2;
      --cream: #f1e7d2;
      --accent: #ffd15c;
      --header-h: 88px
    }

    @media(max-width:639px) {
      :root {
        --cinema-pad-x: 2dvh;
        --header-h: 72px
      }
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #f1e7d2
    }

    .playfair {
      font-family: 'Playfair Display', Georgia, serif
    }

    .dm-serif {
      font-family: 'DM Serif Display', Georgia, serif
    }

    #detail-scroll {
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    #detail-scroll::-webkit-scrollbar {
      display: none;
    }

    /* Logo nav */
    #s3-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 60;
      height: var(--header-h);
      padding: 0 var(--cinema-pad-x);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(26, 31, 58, 0.75);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid rgba(241, 231, 210, 0.08);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.02);
      pointer-events: auto;
      transition: background-color 300ms ease, border-color 300ms ease
    }

    #s3-logo-wrap {
      display: flex;
      align-items: center;
      gap: 14px
    }

    #s3-logo-text {
      display: flex;
      flex-direction: column;
      gap: 2px
    }

    #s3-logo-name {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 22px;
      line-height: 1;
      color: #f1e7d2;
      letter-spacing: 0.02em
    }

    #s3-logo-tagline {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(241, 231, 210, 0.55)
    }

    #s3-nav-cta {
      padding: 10px 24px;
      border-radius: 50px;
      border: 1px solid rgba(241, 231, 210, 0.25);
      background: rgba(241, 231, 210, 0.04);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(241, 231, 210, 0.85);
      cursor: pointer;
      text-decoration: none;
      transition: background 250ms, border-color 250ms, transform 250ms;
      backdrop-filter: blur(8px)
    }

    #s3-nav-cta:hover {
      background: rgba(241, 231, 210, 0.08);
      border-color: rgba(241, 231, 210, 0.7);
      transform: scale(1.04)
    }

    .s3-nav-btn {
      padding: 10px 24px;
      border-radius: 50px;
      border: 1px solid rgba(241, 231, 210, 0.15);
      background: rgba(241, 231, 210, 0.02);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(241, 231, 210, 0.65);
      cursor: pointer;
      text-decoration: none;
      transition: background 250ms, border-color 250ms, transform 250ms, color 250ms;
      backdrop-filter: blur(8px)
    }

    .s3-nav-btn:hover {
      background: rgba(241, 231, 210, 0.06);
      border-color: rgba(241, 231, 210, 0.5);
      color: rgba(241, 231, 210, 0.95);
      transform: scale(1.03)
    }

    @media(max-width:639px) {
      #s3-logo-wrap img {
        width: 44px !important;
        height: 44px !important
      }

      #s3-logo-name {
        font-size: 18px !important
      }

      #s3-logo-tagline {
        font-size: 8px !important;
        letter-spacing: 0.22em !important
      }

      #s3-nav-cta {
        padding: 8px 18px !important;
        font-size: 9px !important;
        letter-spacing: 0.2em !important
      }

      .s3-nav-btn {
        display: none !important
      }
    }

    .bg-waves {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      opacity: 0.1;
      contain: strict;
    }

    #bg-waves-svg {
      position: absolute;
      width: 100%;
      height: 120%;
      top: -10%;
      left: 0;
    }

    @keyframes flap-left {

      0%,
      100% {
        transform: rotate(0deg) skewX(0deg);
      }

      50% {
        transform: rotate(-25deg) skewX(-12deg) scaleX(0.6);
      }
    }

    @keyframes flap-right {

      0%,
      100% {
        transform: rotate(0deg) skewX(0deg);
      }

      50% {
        transform: rotate(30deg) skewX(12deg) scaleX(0.6);
      }
    }

    .wing-left {
      animation: flap-left 0.15s infinite steps(3);
    }

    .wing-right {
      animation: flap-right 0.15s infinite steps(3);
    }

    @keyframes marquee-scroll {
      0% {
        transform: translate3d(0, 0, 0);
      }

      100% {
        transform: translate3d(-33.3333%, 0, 0);
      }
    }

    .marquee-content span {
      display: inline-block;
      flex-shrink: 0;
    }

    /* Custom Vector Graphics Animations (Optimized: active slide and detail-panel only) */
    [data-slide-graphics] {
      opacity: 0;
      transition: opacity 800ms cubic-bezier(0.22, 1, 0.36, 1);
      contain: layout style;
    }

    .active-anim [data-slide-graphics],
    #cinema:not(.scrolled-init) [data-slide-graphics] {
      opacity: 1;
    }

    @keyframes star-twinkle {

      0%,
      100% {
        opacity: 0.15;
        transform: scale(0.7);
      }

      50% {
        opacity: 0.95;
        transform: scale(1.3);
      }
    }

    .active-anim .star-anim-1,
    #detail-scroll .star-anim-1 {
      transform-origin: center;
      animation: star-twinkle 4s infinite ease-in-out;
    }

    .active-anim .star-anim-2,
    #detail-scroll .star-anim-2 {
      transform-origin: center;
      animation: star-twinkle 6s infinite ease-in-out 1.5s;
    }

    .active-anim .star-anim-3,
    #detail-scroll .star-anim-3 {
      transform-origin: center;
      animation: star-twinkle 5s infinite ease-in-out 3s;
    }

    @keyframes rotate-slow {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .active-anim .rotate-slow-anim,
    #detail-scroll .rotate-slow-anim {
      transform-origin: center;
      animation: rotate-slow 40s infinite linear;
    }

    .active-anim .rotate-slow-rev-anim,
    #detail-scroll .rotate-slow-rev-anim {
      transform-origin: center;
      animation: rotate-slow 55s infinite linear reverse;
    }

    /* Slide 2: Key & Path */
    @keyframes key-unlock {
      0% {
        transform: translate(-150px, 0) scale(0.8);
        opacity: 0;
      }

      25% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }

      45% {
        transform: translate(0, 0) rotate(0deg);
      }

      60% {
        transform: translate(0, 0) rotate(-60deg);
      }

      75% {
        transform: translate(0, 0) rotate(0deg);
        opacity: 1;
      }

      90% {
        transform: translate(80px, 0) scale(0.9);
        opacity: 0;
      }

      100% {
        transform: translate(-150px, 0) scale(0.8);
        opacity: 0;
      }
    }

    .active-anim .key-unlock-anim,
    #detail-scroll .key-unlock-anim {
      transform-origin: 1080px 450px;
      animation: key-unlock 6s infinite cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes light-burst {

      0%,
      55% {
        transform: scale(0.4);
        opacity: 0;
      }

      68% {
        transform: scale(1.1);
        opacity: 0.95;
      }

      85% {
        transform: scale(1.3);
        opacity: 0;
      }

      100% {
        transform: scale(0.4);
        opacity: 0;
      }
    }

    .active-anim .light-burst-anim,
    #detail-scroll .light-burst-anim {
      transform-origin: 1080px 450px;
      animation: light-burst 6s infinite ease-out;
    }

    /* Slide 3: Padlock Pop */
    @keyframes padlock-shackle {

      0%,
      15% {
        transform: translate(0, 0);
      }

      30%,
      75% {
        transform: translate(0, -45px);
      }

      90%,
      100% {
        transform: translate(0, 0);
      }
    }

    @keyframes padlock-body {

      0%,
      15% {
        transform: rotate(0deg);
      }

      18% {
        transform: rotate(8deg);
      }

      21% {
        transform: rotate(-8deg);
      }

      24% {
        transform: rotate(5deg);
      }

      27% {
        transform: rotate(-3deg);
      }

      30% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(0deg);
      }
    }

    @keyframes lock-sparkle {

      0%,
      25%,
      85%,
      100% {
        opacity: 0;
        transform: scale(0.3) rotate(0deg);
      }

      35%,
      75% {
        opacity: 0.9;
        transform: scale(1.2) rotate(45deg);
      }
    }

    .active-anim .padlock-shackle-anim,
    #detail-scroll .padlock-shackle-anim {
      transform-origin: 1080px 430px;
      animation: padlock-shackle 5.5s infinite ease-in-out;
    }

    .active-anim .padlock-body-anim,
    #detail-scroll .padlock-body-anim {
      transform-origin: 1080px 450px;
      animation: padlock-body 5.5s infinite ease-in-out;
    }

    .active-anim .lock-sparkle-anim,
    #detail-scroll .lock-sparkle-anim {
      transform-origin: 1080px 450px;
      animation: lock-sparkle 5.5s infinite ease-in-out;
    }

    /* Slide 4: Target & Arrow */
    @keyframes bow-draw {

      0%,
      100% {
        transform: scaleX(1);
      }

      20% {
        transform: scaleX(0.78);
      }

      25% {
        transform: scaleX(1.08);
      }
    }

    @keyframes arrow-shoot {
      0% {
        transform: translate(-150px, 0);
        opacity: 0;
      }

      18% {
        transform: translate(-200px, 0);
        opacity: 1;
      }

      20% {
        transform: translate(-200px, 0);
        opacity: 1;
      }

      24% {
        transform: translate(450px, 0);
        opacity: 1;
      }

      75% {
        transform: translate(450px, 0);
        opacity: 1;
      }

      82% {
        transform: translate(450px, 0);
        opacity: 0;
      }

      100% {
        transform: translate(-150px, 0);
        opacity: 0;
      }
    }

    @keyframes target-hit {

      0%,
      22% {
        transform: scale(1);
      }

      23% {
        transform: scale(0.9) translate(-10px, 0);
      }

      28% {
        transform: scale(1.15) translate(6px, 0);
      }

      33% {
        transform: scale(0.96) translate(-2px, 0);
      }

      38%,
      100% {
        transform: scale(1);
      }
    }

    @keyframes target-ripple {

      0%,
      22% {
        transform: scale(0.7);
        opacity: 0;
      }

      23% {
        transform: scale(1);
        opacity: 0.85;
      }

      50% {
        transform: scale(1.85);
        opacity: 0;
      }

      100% {
        transform: scale(1.85);
        opacity: 0;
      }
    }

    .active-anim .bow-anim,
    #detail-scroll .bow-anim {
      transform-origin: 600px 450px;
      animation: bow-draw 5.5s infinite cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .active-anim .arrow-anim,
    #detail-scroll .arrow-anim {
      transform-origin: 600px 450px;
      animation: arrow-shoot 5.5s infinite cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .active-anim .target-anim,
    #detail-scroll .target-anim {
      transform-origin: 1080px 450px;
      animation: target-hit 5.5s infinite ease-out;
    }

    .active-anim .target-ripple-anim,
    #detail-scroll .target-ripple-anim {
      transform-origin: 1080px 450px;
      animation: target-ripple 5.5s infinite ease-out;
    }

    /* Slide 5: Airplane Glide */
    @keyframes airplane-glide {
      0% {
        transform: translate(-150px, 200px) rotate(8deg);
        opacity: 0;
      }

      8% {
        opacity: 1;
      }

      45% {
        transform: translate(320px, 50px) rotate(-12deg);
      }

      85% {
        opacity: 1;
      }

      100% {
        transform: translate(720px, -150px) rotate(20deg);
        opacity: 0;
      }
    }

    @keyframes wind-dash {
      0% {
        stroke-dashoffset: 400;
      }

      100% {
        stroke-dashoffset: -400;
      }
    }

    .active-anim .airplane-anim,
    #detail-scroll .airplane-anim {
      transform-origin: center;
      animation: airplane-glide 8.5s infinite linear;
    }

    .active-anim .wind-dash-anim,
    #detail-scroll .wind-dash-anim {
      stroke-dasharray: 60 60;
      animation: wind-dash 15s infinite linear;
    }

    /* Slide 6: Neural Departments */
    @keyframes node-pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.85;
      }

      50% {
        transform: scale(1.15);
        opacity: 1;
      }
    }

    @keyframes packet-travel {
      0% {
        stroke-dashoffset: 0;
      }

      100% {
        stroke-dashoffset: -120;
      }
    }

    .active-anim .node-pulse-1,
    #detail-scroll .node-pulse-1 {
      transform-origin: 1080px 450px;
      animation: node-pulse 3s infinite ease-in-out;
    }

    .active-anim .node-pulse-2,
    #detail-scroll .node-pulse-2 {
      transform-origin: 920px 320px;
      animation: node-pulse 3.5s infinite ease-in-out 0.5s;
    }

    .active-anim .node-pulse-3,
    #detail-scroll .node-pulse-3 {
      transform-origin: 1240px 320px;
      animation: node-pulse 3.2s infinite ease-in-out 1.2s;
    }

    .active-anim .node-pulse-4,
    #detail-scroll .node-pulse-4 {
      transform-origin: 960px 580px;
      animation: node-pulse 3.8s infinite ease-in-out 1.8s;
    }

    .active-anim .node-pulse-5,
    #detail-scroll .node-pulse-5 {
      transform-origin: 1200px 580px;
      animation: node-pulse 3.4s infinite ease-in-out 2.4s;
    }

    .active-anim .packet-path,
    #detail-scroll .packet-path {
      stroke-dasharray: 8 16;
      animation: packet-travel 6s infinite linear;
    }
    #mobile-warning { display: none !important; }

    @media (max-width: 767px) {
      #s3-logo-text {
        display: none !important;
      }
      #s3-nav-actions {
        gap: 6px !important;
      }
      .s3-nav-btn {
        display: inline-block !important;
        padding: 6px 12px !important;
        font-size: 8px !important;
        letter-spacing: 0.1em !important;
      }
      #s3-nav-cta {
        padding: 6px 12px !important;
        font-size: 8px !important;
        letter-spacing: 0.1em !important;
      }
      
      /* Slide layout stacking */
      .slide-content-inner {
        display: flex !important;
        flex-direction: column !important;
        justify-content: flex-start !important;
        align-items: stretch !important;
        height: 100% !important;
        padding: 110px 20px 20px 20px !important; /* Clear fixed navigation bar */
        box-sizing: border-box !important;
        gap: 16px !important;
        overflow-y: auto !important;
      }
      
      .slide-top-left,
      .slide-bottom-left,
      .slide-right,
      .slide-explore-btn {
        position: static !important;
        transform: none !important;
        max-width: 100% !important;
        width: 100% !important;
        display: flex !important;
        flex-direction: column !important;
        align-items: flex-start !important;
        text-align: left !important;
      }
      
      .slide-right {
        margin-top: 10px !important;
      }
      
      .slide-explore-btn {
        margin-top: 10px !important;
        position: relative !important;
        align-items: center !important;
        justify-content: center !important;
        width: auto !important;
        padding: 10px 24px !important;
        font-size: 10px !important;
      }
      
      /* Overview Slide Mobile tweaks */
      .overview-inner {
        padding: 110px 20px 20px 20px !important;
        justify-content: flex-start !important;
      }
      .overview-content-wrap {
        margin-bottom: 20px !important;
        max-width: 100% !important;
      }
      
      /* Adjust typography for mobile */
      .dm-serif {
        font-size: 2.2rem !important;
        line-height: 1.1 !important;
      }
      .playfair {
        font-size: 1.1rem !important;
      }
    }
  </style>
</head>

<body>

  <div id="mobile-warning" style="display:none !important;"></div>

  <!-- Sign In Modal -->
  <div id="signin-modal"
    style="display:none; position:fixed; inset:0; z-index:999999; background:rgba(13,15,26,0.6); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); align-items:center; justify-content:center; opacity:0; transition:opacity 300ms ease;">
    <div
      style="background:rgba(26,31,58,0.92); border:1px solid rgba(241,231,210,0.12); padding:40px; border-radius:32px; width:min(440px,90%); text-align:center; box-shadow:0 30px 70px rgba(0,0,0,0.5); display:flex; flex-direction:column; align-items:center; gap:24px; position:relative;">

      <!-- Close button -->
      <button onclick="closeSignInModal()" aria-label="Close modal"
        style="position:absolute; right:20px; top:20px; background:none; border:none; color:rgba(241,231,210,0.5); cursor:pointer; font-size:20px; transition:color 200ms;"
        onmouseenter="this.style.color='#fff'" onmouseleave="this.style.color='rgba(241,231,210,0.5)'">✕</button>

      <!-- S3 Logo -->
      <img src="images/logo.png" alt="S³ Logo"
        style="width:64px; height:64px; border-radius:50%; background:#f5efe8; object-fit:cover;" />

      <!-- Text -->
      <div>
        <h2 class="playfair"
          style="font-size:24px; color:#f1e7d2; font-weight:400; margin-bottom:8px; font-style:italic;">Sign In</h2>
        <p style="font-size:13px; color:rgba(241,231,210,0.65); line-height:1.5; font-family:'Inter',sans-serif;">Access
          your S³ account to build opportunities and connect with talent.</p>
      </div>

      <!-- Continue with Google Button -->
      <button onclick="handleGoogleSignIn()"
        style="width:100%; display:flex; align-items:center; justify-content:center; gap:12px; background:#ffffff; border:none; color:#1a1f3a; padding:14px 24px; border-radius:50px; font-size:14px; font-weight:600; cursor:pointer; transition:background 200ms, transform 200ms; font-family:'Inter',sans-serif;"
        onmouseenter="this.style.background='#f3f4f6'; this.style.transform='scale(1.02)';"
        onmouseleave="this.style.background='#ffffff'; this.style.transform=''">
        <!-- Google SVG Icon -->
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M17.64 9.20455C17.64 8.56636 17.5827 7.95273 17.4764 7.36364H9V10.845H13.8436C13.635 11.97 13.0009 12.9232 12.0477 13.5614V15.8195H14.9564C16.6582 14.2527 17.64 11.9455 17.64 9.20455Z"
            fill="#4285F4" />
          <path
            d="M9 18C11.43 18 13.4673 17.1941 14.9577 15.8195L12.0491 13.5614C11.2418 14.1027 10.2109 14.4205 9 14.4205C6.65591 14.4205 4.67182 12.8373 3.96409 10.71H0.957275V13.0418C2.43818 15.9832 5.48182 18 9 18Z"
            fill="#34A853" />
          <path
            d="M3.96409 10.71C3.78409 10.17 3.68182 9.59318 3.68182 9C3.68182 8.40682 3.78409 7.83 3.96409 7.29V4.95818H0.957275C0.347727 6.17318 0 7.54773 0 9C0 10.4523 0.347727 11.8268 0.957275 13.0418L3.96409 10.71Z"
            fill="#FBBC05" />
          <path
            d="M9 3.57955C10.3214 3.57955 11.5077 4.03364 12.4405 4.92545L15.0218 2.34409C13.4632 0.891818 11.4259 0 9 0C5.48182 0 2.43818 2.01682 0.957275 4.95818L3.96409 7.29C4.67182 5.16273 6.65591 3.57955 9 3.57955Z"
            fill="#EA4335" />
        </svg>
        Continue with Google
      </button>

    </div>
  </div>

  <!-- NAV / LOGO -->
  <nav id="s3-nav" aria-label="S³ Navigation">
    <div id="s3-logo-wrap">
      <img src="images/logo.png" alt="S³ Logo"
        style="width:56px;height:56px;border-radius:50%;object-fit:cover;flex-shrink:0;background:#f5efe8">
      <div id="s3-logo-text">
        <div id="s3-logo-name">S<sup
            style="font-size:13px;vertical-align:super;font-family:'Inter',sans-serif;font-weight:600">3</sup></div>
        <div id="s3-logo-tagline">Building Opportunities</div>
      </div>
    </div>
    <div id="s3-nav-actions" style="display:flex;align-items:center;gap:12px">
      <a class="s3-nav-btn" href="students.html">For Students</a>
      <a class="s3-nav-btn" href="business.html">For Businesses</a>

      <a id="s3-nav-cta" href="https://www.instagram.com/thescubeofficial/" target="_blank" rel="noopener">Contact
        Us</a>
    </div>

      function drawSlide1Mask(revealLayer, cx, cy) {
        if (cx < 0) {
          revealLayer.style.maskPosition = '-999px -999px';
          revealLayer.style.webkitMaskPosition = '-999px -999px';
          return;
        }
        if (!revealLayer.style.maskImage && !revealLayer.style.webkitMaskImage) {
          const maskImage = 'radial-gradient(circle 260px at center, #fff 0%, #fff 40%, rgba(255,255,255,0.75) 60%, rgba(255,255,255,0.4) 75%, rgba(255,255,255,0.12) 88%, transparent 100%)';
          revealLayer.style.maskImage = maskImage;
          revealLayer.style.webkitMaskImage = maskImage;
          revealLayer.style.maskSize = '520px 520px';
          revealLayer.style.webkitMaskSize = '520px 520px';
          revealLayer.style.maskRepeat = 'no-repeat';
          revealLayer.style.webkitMaskRepeat = 'no-repeat';
        }
        const px = (cx - 260) | 0;
        const py = (cy - 260) | 0;
        const pos = `${px}px ${py}px`;
        revealLayer.style.maskPosition = pos;
        revealLayer.style.webkitMaskPosition = pos;
      }

      function maybeWrap() {
        while (idxRef < N) {
          idxRef += N; prevIdxRef += N;
          const shift = N * pitch;
          yRef -= shift; targetYRef -= shift;
          if (drag.active) drag.startTrackY -= shift;
        }
        while (idxRef >= (LOOP_COPIES - 1) * N) {
          idxRef -= N; prevIdxRef -= N;
          const shift = N * pitch;
          yRef += shift; targetYRef += shift;
          if (drag.active) drag.startTrackY += shift;
        }

      function setIndex(next) {
        if (next === idxRef) return;
        prevIdxRef = idxRef;
        idxRef = next;
        targetYRef = topPad - next * pitch;
        activeIdx = modN(next);
        updatePips();
        maybeWrap();

        const currentMod = modN(idxRef);
        let diff = targetMod - currentMod;
        if (diff > N / 2) diff -= N;
        else if (diff < -N / 2) diff += N;
        if (diff === 0) return;
        setIndex(idxRef + diff);

      function closeDetail() {

      // ─── BUILD ────────────────────────────────────────────────────────────────
      for (let i = 0; i < TOTAL; i++) { buildSlideFrame(SLIDES[modN(i)], i); }
      buildPips();
      updatePanelPositions();
      track.style.transform = `translate3d(0,${yRef}px,0)`;

      // Preload local images
      SLIDES.forEach(s => { const img = new Image(); img.src = s.imagePath; });

      // ─── ENTRANCE TIMELINE ────────────────────────────────────────────────────
      const tweenObj = { p: 0 };
      let timelineDone = false;

      // Use CSS blur on track instead of SVG filter (much faster on Safari)
      let currentTrackBlur = 0;

      function onScrollUpdate() {
        const p = tweenObj.p;
        const idxF = AUTO_START_IDX + (AUTO_END_IDX - AUTO_START_IDX) * p;
        const vpVh = SLIDE_VH * AUTO_SCALE_FROM + GAP_VH;
        yRef = ((TOP_PAD_VH - idxF * vpVh) * viewportH) / 100;
        targetYRef = yRef;
        const vhToPx = viewportH / 100;
        const visualPitchPx = vpVh * vhToPx;

        // Only update visible slides (within ~2 viewport heights)
        const viewTop = -yRef - viewportH;
        const viewBot = -yRef + viewportH * 2;

        for (let i = 0; i < TOTAL; i++) {
          const el = slideEls[i];
          if (!el) continue;
          const slotTop = i * visualPitchPx;
          // Skip slides far outside viewport
          if (slotTop < viewTop || slotTop > viewBot) continue;
          el.style.transform = `translate3d(0,0,0)`;
          let wrap = slideWrapCache[i];
          if (!wrap) { wrap = el.querySelector("[data-slide-image]"); slideWrapCache[i] = wrap; }
          if (wrap) {
            const visualDyPx = (i - idxF) * visualPitchPx;
            wrap.style.transform = `translate3d(0,${(-visualDyPx / IMG_HEIGHT_RATIO).toFixed(2)}px,0)`;
          }
        }
        if (bgWaves) { bgWaves.style.transform = `translate3d(0,${(yRef * 0.12).toFixed(2)}px,0)`; }
        const now = performance.now();
        let norm = 1;
        if (lastBlurTs > 0) {
          const dt = Math.max(now - lastBlurTs, 1);
          const dp = Math.abs(p - lastBlurP);
          const idxRange = AUTO_END_IDX - AUTO_START_IDX;
          const idxSpeed = (dp * idxRange) / dt;
          const peakSpeed = (idxRange * 3) / (AUTO_SCROLL_MS / 1000 * 1000);
          norm = Math.min(idxSpeed / peakSpeed, 1);
        }
        lastBlurP = p; lastBlurTs = now;
        // CSS blur instead of SVG feGaussianBlur (Safari perf)
        const targetBlur = norm * 12;
        if (Math.abs(targetBlur - currentTrackBlur) > 0.5) {
          currentTrackBlur = targetBlur;
          track.style.filter = targetBlur > 0.5 ? `blur(${targetBlur.toFixed(1)}px)` : 'none';
        }
        scanlines.style.opacity = norm.toFixed(3);
      }

      const mainTween = gsap.timeline({
        onUpdate: onScrollUpdate, onComplete: () => {
          if (timelineDone) return;
          timelineDone = true;
          for (let i = 0; i < TOTAL; i++) { if (slideEls[i]) slideEls[i].style.transform = ""; }
          autoScrolling = false;
          scanlines.style.display = "none";
          track.style.filter = "none";
          currentTrackBlur = 0;
          idxRef = AUTO_END_IDX;
          prevIdxRef = AUTO_END_IDX;
          targetYRef = topPad - AUTO_END_IDX * pitch;
          yRef = targetYRef;

      function tick() {
        const now = performance.now();
        const isDragging = drag.active;
        const wheelActive = now - wheelLastTime < WHEEL_PAUSE_MS;

        if (!isDragging && !wheelActive && !autoScrolling) {

            yRef = targetYRef;

          }
          else {
            yRef += dy * EASE;
            deactivateAndUnloadAll();

        } else if (!autoScrolling) {
          deactivateAndUnloadAll();

        track.style.transform = `translate3d(0,${yRef | 0}px,0)`;

        const viewCenter = viewportH / 2;

        for (let i = 0; i < TOTAL; i++) {
          const el = slideEls[i];
          if (!el) continue;
          const effectiveTop = i * pitch + y;
          const slideCenter = effectiveTop + slideH / 2;
          const dy = slideCenter - viewCenter;
          const dn = Math.abs(dy) / slideH;

          // Skip far off-screen slides entirely (perf: avoid querying DOM)
          if (dn > 3) continue;

          let wrap = slideWrapCache[i];
          if (!wrap) { wrap = el.querySelector("[data-slide-image]"); slideWrapCache[i] = wrap; }
          const contentEl = el.querySelector("[data-slide-content]");

          if (dn > 2) {
            if (contentEl && contentEl.style.opacity !== "0") { contentEl.style.opacity = "0"; }
            continue;
          }

          if (wrap && !autoScrolling) {
            wrap.style.transform = `translate3d(0,${(-dy / IMG_HEIGHT_RATIO) | 0}px,0)`;
          }

            if (contentEl && contentEl.style.opacity !== "0") { contentEl.style.opacity = "0"; }

          }

          const isLeaving = i === prevIdxRef && prevIdxRef !== idxRef;
          let opacity = 0, cy = 0;

          if (isActive) {
            const t = Math.max(0, Math.min(1, 1 - dn / FADE_THRESHOLD));
            opacity = t * t * (3 - 2 * t);
            cy = (1 - opacity) * ENTRY_OFFSET_PX * Math.sign(dy || 1);
          } else if (isLeaving) {
            const fade = Math.max(0, 1 - Math.max(0, dn - 0.6) / 0.6);
            opacity = fade;
            cy = -dy * PARALLAX_FACTOR;
          } else {
            opacity = 0; cy = 0;
          }

          contentEl.style.transform = `translate3d(0,${cy | 0}px,0)`;
          contentEl.style.opacity = opacity.toFixed(3);
        }

        // Cursor — faster interpolation for snappier feel on Safari
        const px = cursorPos.x, py = cursorPos.y;
        if (!cursorInit && (px !== 0 || py !== 0)) { cursorRender.x = px; cursorRender.y = py; cursorInit = true; }

        // Calculate difference to determine direction
        const dx = px - cursorRender.x;
        if (dx > 1) { cursorRender.dirScaleX = -1; }
        else if (dx < -1) { cursorRender.dirScaleX = 1; }

        // Interpolate position and scaleX flip (0.35 = snappier than 0.18)
        cursorRender.x += (px - cursorRender.x) * 0.35;
        cursorRender.y += (py - cursorRender.y) * 0.35;
        cursorRender.currentScaleX += (cursorRender.dirScaleX - cursorRender.currentScaleX) * 0.25;

        const targetOpacity = onSection && cursorInit ? 1 : 0;
        cursorRender.opacity += (targetOpacity - cursorRender.opacity) * 0.25;
        const targetScale = isDown ? 1.2 : 1;
        cursorRender.scale += (targetScale - cursorRender.scale) * 0.3;

        cursor.style.transform = `translate3d(${cursorRender.x | 0}px,${cursorRender.y | 0}px,0) translate(16px, 16px) scale(${cursorRender.scale.toFixed(2)}) scaleX(${cursorRender.currentScaleX.toFixed(1)})`;
        cursor.style.opacity = cursorRender.opacity.toFixed(2);

        const zone = cursorZone;
        if (curScroll) curScroll.style.opacity = (zone === null && !isDown && !cursorOnUi) ? "1" : "0";
        if (curDrag) curDrag.style.opacity = (isDown && zone === null) ? "1" : "0";
        if (curUp) curUp.style.opacity = (zone === "top" || (isDown && zone === null)) ? "1" : "0";

            const spotlightContainer = activeSlideEl.querySelector(".slide1-spotlight-container");
            if (revealLayer && spotlightContainer) {
              const rect = spotlightContainer.getBoundingClientRect();
              const relativeMouseX = cursorPos.x - rect.left;
              const relativeMouseY = cursorPos.y - rect.top;

              if (slide1Smooth.x === -999) {
                slide1Smooth.x = relativeMouseX;
                slide1Smooth.y = relativeMouseY;
              } else {
                slide1Smooth.x += (relativeMouseX - slide1Smooth.x) * 0.2;
                slide1Smooth.y += (relativeMouseY - slide1Smooth.y) * 0.2;
              }
              drawSlide1Mask(revealLayer, slide1Smooth.x | 0, slide1Smooth.y | 0);
            }
          } else {
            slide1Smooth.x = -999;
            slide1Smooth.y = -999;
          }

          if (detailsOpen && openSlideKey === "overview") {
            const detailScrollEl = document.getElementById("detail-scroll");
            if (detailScrollEl) {
              const revealLayer = detailScrollEl.querySelector(".slide1-reveal-layer");
              const spotlightContainer = detailScrollEl.querySelector(".slide1-spotlight-container");
              if (revealLayer && spotlightContainer) {
                const rect = spotlightContainer.getBoundingClientRect();
                const relativeMouseX = cursorPos.x - rect.left;
                const relativeMouseY = cursorPos.y - rect.top;

                if (detailSmooth.x === -999) {
                  detailSmooth.x = relativeMouseX;
                  detailSmooth.y = relativeMouseY;
                } else {
                  detailSmooth.x += (relativeMouseX - detailSmooth.x) * 0.2;
                  detailSmooth.y += (relativeMouseY - detailSmooth.y) * 0.2;
                }
                drawSlide1Mask(revealLayer, detailSmooth.x | 0, detailSmooth.y | 0);
              }
            }
          } else {
            detailSmooth.x = -999;
            detailSmooth.y = -999;
          }
        }

        raf = requestAnimationFrame(tick);
      }

      window.addEventListener("wheel", e => {
        if (autoScrolling || openSlideKey) return;
        if (!onSection) {

        if (t && t.closest("#detail-aside")) return;

        const now = performance.now();
        if (now < wheelCooldownUntil) return;
        const dir = e.deltaY > 0 ? 1 : -1;
        wheelCooldownUntil = now + WHEEL_COOLDOWN_MS;
        wheelLastTime = now;
        setIndex(idxRef + dir);
      }, { passive: false });

      section.addEventListener("pointerdown", e => {

        if (t && t.closest("[data-no-drag]")) return;

        drag.startClientY = e.clientY;

        const zone = cursorZone;
        drag.active = false;

        if (zone && Math.abs(delta) < 8) { closeDetail(); setIndex(idxRef + (zone === "top" ? -1 : 1)); return; }
        if (Math.abs(delta) > dragThresh) { setIndex(idxRef + (delta < 0 ? 1 : -1)); }

        if (!drag.active) return;
        try { section.releasePointerCapture(drag.pointerId); } catch { }
        endDrag(true);

      section.addEventListener("pointerleave", () => { onSection = false; if (drag.active) endDrag(true); });

      window.addEventListener("keydown", e => {
        if (!onSection) return;
        if (e.key === "Escape") { closeDetail(); return; }
